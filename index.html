<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Turbo CNY 2026 - Javier Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background: #000; 
            overflow: hidden; 
            margin: 0; 
            touch-action: manipulation;
        }
        @keyframes roadMove { from { transform: translateY(-200px); } to { transform: translateY(0); } }
        .road-animate { animation: roadMove var(--speed) linear infinite; }
        
        @keyframes explosion {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(3); opacity: 0.8; filter: blur(2px); }
            100% { transform: scale(4); opacity: 0; }
        }
        .explode-effect {
            position: absolute;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, #ffeb3b, #f44336, transparent);
            border-radius: 50%;
            animation: explosion 0.5s ease-out forwards;
            pointer-events: none;
            z-index: 100;
        }

        .shake-once { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0% { transform: translate(2px, 2px); }
            25% { transform: translate(-2px, -2px); }
            50% { transform: translate(2px, -2px); }
            75% { transform: translate(-2px, 2px); }
            100% { transform: translate(0, 0); }
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, query, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        window.FirebaseSDK = {
            initializeApp, getFirestore, doc, setDoc, getDoc, onSnapshot, collection, query, deleteDoc,
            getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icons = {
            Play: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
            ShoppingCart: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>,
            Coins: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/><path d="M7 6h1v4"/></svg>,
            Camera: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>,
            ChevronRight: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
            ChevronLeft: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        };

        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'turbo-cny-javier';

        const VEHICLES = [
            { id: 'starter', name: 'Drift King', color: '#ef4444', price: 0, maxSpeed: 8, acceleration: 0.1, desc: 'Mobil pemula yang lincah.' },
            { id: 'tuner', name: 'JDM Spirit', color: '#3b82f6', price: 1500, maxSpeed: 12, acceleration: 0.15, desc: 'Cepat dan stabil di tikungan.' },
            { id: 'cny_dragon', name: 'Fire Dragon', color: '#dc2626', price: 8888, maxSpeed: 22, acceleration: 0.28, special: 'CNY', desc: 'Kekuatan Naga Tahun Baru!' },
            { id: 'god', name: 'Speed God', color: '#fbbf24', price: 500000, maxSpeed: 55, acceleration: 1.0, desc: 'Hanya untuk sang legenda.' },
        ];

        const NPC_COLORS = ['#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4', '#ffffff'];

        function CarModel({ color, scale = 1, isPOV = false }) {
            if (isPOV) return (
                <div className="relative w-full h-full flex items-end justify-center">
                    <div className="w-[120%] h-32 bg-slate-800 rounded-t-[100px] border-t-4 border-slate-700 relative shadow-2xl">
                        <div className="absolute top-4 left-1/2 -translate-x-1/2 w-24 h-24 border-8 border-slate-600 rounded-full flex items-center justify-center">
                            <div className="w-1 h-10 bg-red-500 origin-bottom" style={{ transform: 'rotate(-45deg)' }} />
                        </div>
                    </div>
                </div>
            );
            return (
                <div style={{ transform: `scale(${scale})` }}>
                    <svg width="45" height="90" viewBox="0 0 45 90">
                        <path d="M5 15 C 5 5, 40 5, 40 15 L 42 75 C 42 85, 3 85, 3 75 Z" fill={color} stroke="#000" strokeWidth="2" />
                        <path d="M10 30 L 35 30 L 37 55 C 37 60, 8 60, 8 55 Z" fill="#0f172a" />
                        <rect x="2" y="78" width="41" height="6" rx="1" fill="#000" />
                        <rect x="-2" y="15" width="8" height="18" rx="4" fill="#000" />
                        <rect x="39" y="15" width="8" height="18" rx="4" fill="#000" />
                    </svg>
                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [userData, setUserData] = useState({ coins: 0, unlocked: ['starter'], selectedVehicle: 'starter' });
            const [gameState, setGameState] = useState('menu'); // 'menu', 'playing', 'garage'
            const [cameraMode, setCameraMode] = useState('third');
            const [npcs, setNpcs] = useState([]);
            const [explosion, setExplosion] = useState(null);
            const [isShaking, setIsShaking] = useState(false);
            const [myCar, setMyCar] = useState({ x: 50, distance: 0, speed: 0, isCrashed: false, finishLine: 5000 });
            
            // State untuk Garasi
            const [garageIndex, setGarageIndex] = useState(0);

            const keys = useRef({});
            const requestRef = useRef();
            const npcRef = useRef([]);

            const { initializeApp, getFirestore, doc, setDoc, getDoc, getAuth, signInAnonymously, onAuthStateChanged } = window.FirebaseSDK;
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);

            useEffect(() => {
                signInAnonymously(auth);
                onAuthStateChanged(auth, async (u) => {
                    if (u) {
                        setUser(u);
                        const userDoc = doc(db, 'artifacts', appId, 'users', u.uid, 'profile', 'data');
                        const snap = await getDoc(userDoc);
                        if (snap.exists()) {
                            const data = snap.data();
                            setUserData(data);
                            // Set garage index ke mobil yang sedang terpilih
                            const idx = VEHICLES.findIndex(v => v.id === data.selectedVehicle);
                            if (idx !== -1) setGarageIndex(idx);
                        } else {
                            await setDoc(userDoc, { coins: 1000, unlocked: ['starter'], selectedVehicle: 'starter' });
                        }
                    }
                });
            }, []);

            const curVeh = VEHICLES.find(v => v.id === userData.selectedVehicle) || VEHICLES[0];
            const garageVeh = VEHICLES[garageIndex];

            const updateUserData = async (newData) => {
                setUserData(newData);
                if (user) {
                    await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data'), newData);
                }
            };

            const spawnNpc = () => ({ 
                id: Math.random(), 
                x: 20 + Math.random()*60, 
                y: -20, 
                speed: 0.5 + Math.random()*1,
                color: NPC_COLORS[Math.floor(Math.random() * NPC_COLORS.length)] 
            });

            const gameLoop = () => {
                if (gameState !== 'playing') return;
                setMyCar(prev => {
                    if (prev.isCrashed) return { ...prev, speed: 0 };

                    let nx = prev.x; 
                    let ns = prev.speed; 
                    let nd = prev.distance;

                    if (keys.current['a'] || keys.current['arrowleft']) nx -= 1.5;
                    if (keys.current['d'] || keys.current['arrowright']) nx += 1.5;
                    if (keys.current['w'] || keys.current['arrowup'] || keys.current[' ']) ns = Math.min(ns + curVeh.acceleration, curVeh.maxSpeed);
                    else ns = Math.max(ns - 0.1, 0);

                    nx = Math.max(15, Math.min(85, nx));
                    nd += ns;

                    const nextNpcs = npcRef.current.map(n => ({ ...n, y: n.y + (n.speed + ns * 0.3) })).filter(n => n.y < 120);
                    if (nextNpcs.length < 4 && Math.random() < 0.03) nextNpcs.push(spawnNpc());

                    let hasCrashed = false;
                    nextNpcs.forEach(n => {
                        if (Math.abs(n.x - nx) < 8 && Math.abs(n.y - 80) < 10) {
                            hasCrashed = true;
                            setExplosion({ x: nx, y: 80 });
                            setIsShaking(true);
                            setTimeout(() => {
                                setExplosion(null);
                                setIsShaking(false);
                                setGameState('menu');
                                setNpcs([]);
                                npcRef.current = [];
                                setMyCar(m => ({ ...m, distance: 0, speed: 0, isCrashed: false }));
                            }, 1000);
                        }
                    });

                    npcRef.current = nextNpcs;
                    setNpcs(nextNpcs);

                    if (nd >= prev.finishLine) {
                        setGameState('menu');
                        const reward = 2000;
                        updateUserData({ ...userData, coins: userData.coins + reward });
                        setNpcs([]);
                        npcRef.current = [];
                        return { ...prev, speed: 0, distance: 0 };
                    }

                    return { ...prev, x: nx, speed: ns, distance: nd, isCrashed: hasCrashed };
                });
                requestRef.current = requestAnimationFrame(gameLoop);
            };

            useEffect(() => {
                if (gameState === 'playing') {
                    const kd = e => keys.current[e.key.toLowerCase()] = true;
                    const ku = e => keys.current[e.key.toLowerCase()] = false;
                    window.addEventListener('keydown', kd); window.addEventListener('keyup', ku);
                    requestRef.current = requestAnimationFrame(gameLoop);
                    return () => { window.removeEventListener('keydown', kd); window.removeEventListener('keyup', ku); cancelAnimationFrame(requestRef.current); };
                }
            }, [gameState]);

            const buyOrSelect = () => {
                const isUnlocked = userData.unlocked.includes(garageVeh.id);
                if (isUnlocked) {
                    updateUserData({ ...userData, selectedVehicle: garageVeh.id });
                } else if (userData.coins >= garageVeh.price) {
                    updateUserData({ 
                        ...userData, 
                        coins: userData.coins - garageVeh.price,
                        unlocked: [...userData.unlocked, garageVeh.id],
                        selectedVehicle: garageVeh.id
                    });
                }
            };

            return (
                <div className={`w-full h-screen bg-black text-white overflow-hidden ${isShaking ? 'shake-once' : ''}`}>
                    {gameState === 'menu' && (
                        <div className="h-full flex flex-col items-center justify-center p-6 bg-gradient-to-b from-red-900/20 to-black">
                            <h1 className="text-6xl font-black italic mb-2 tracking-tighter">TURBO <span className="text-red-500">CNY</span></h1>
                            <p className="text-yellow-500 font-bold mb-8 tracking-[0.3em] uppercase italic">Javier Edition</p>
                            
                            <div className="flex flex-col gap-4 w-full max-w-xs">
                                <button onClick={() => setGameState('playing')} className="bg-red-600 py-4 rounded-2xl font-black text-xl hover:scale-105 transition-transform flex items-center justify-center gap-2 shadow-lg shadow-red-600/20">
                                    <Icons.Play /> BALAPAN
                                </button>
                                <button onClick={() => setGameState('garage')} className="bg-white/10 py-4 rounded-2xl font-bold text-lg hover:bg-white/20 transition-all flex items-center justify-center gap-2 border border-white/10">
                                    <Icons.ShoppingCart /> GARASI
                                </button>
                            </div>

                            <div className="mt-8 bg-black/40 p-4 rounded-2xl border border-white/5 text-center">
                                <p className="text-[10px] text-slate-400 uppercase font-bold tracking-widest mb-1">Mobil Terpilih</p>
                                <p className="text-lg font-black text-red-500 italic">{curVeh.name}</p>
                            </div>

                            <div className="absolute top-6 right-6 bg-white/5 px-4 py-2 rounded-full border border-white/10 flex items-center gap-2">
                                <Icons.Coins /> <span className="font-bold">{userData.coins.toLocaleString()}</span>
                            </div>

                            <div className="absolute bottom-6 opacity-30 text-[10px] uppercase font-bold tracking-widest">
                                Made by Javier
                            </div>
                        </div>
                    )}

                    {gameState === 'garage' && (
                        <div className="h-full flex flex-col p-6 bg-slate-950">
                            <div className="flex justify-between items-center mb-8">
                                <button onClick={() => setGameState('menu')} className="p-2 hover:bg-white/10 rounded-full transition-colors">
                                    <Icons.ChevronLeft />
                                </button>
                                <h2 className="text-2xl font-black italic">GARASI</h2>
                                <div className="flex items-center gap-2 text-yellow-500 font-bold">
                                    <Icons.Coins /> {userData.coins.toLocaleString()}
                                </div>
                            </div>

                            <div className="flex-1 flex flex-col items-center justify-center">
                                <div className="relative flex items-center justify-center w-full max-w-md">
                                    <button 
                                        onClick={() => setGarageIndex(prev => (prev > 0 ? prev - 1 : VEHICLES.length - 1))}
                                        className="absolute left-0 z-10 p-3 bg-white/5 hover:bg-white/10 rounded-full border border-white/10"
                                    >
                                        <Icons.ChevronLeft />
                                    </button>
                                    
                                    <div className="py-12 transform scale-150">
                                        <CarModel color={garageVeh.color} scale={1.2} />
                                    </div>

                                    <button 
                                        onClick={() => setGarageIndex(prev => (prev < VEHICLES.length - 1 ? prev + 1 : 0))}
                                        className="absolute right-0 z-10 p-3 bg-white/5 hover:bg-white/10 rounded-full border border-white/10"
                                    >
                                        <Icons.ChevronRight />
                                    </button>
                                </div>

                                <div className="mt-12 text-center w-full max-w-sm">
                                    <h3 className="text-3xl font-black italic mb-2 tracking-tight">{garageVeh.name}</h3>
                                    <p className="text-slate-400 text-sm mb-6">{garageVeh.desc}</p>
                                    
                                    <div className="grid grid-cols-2 gap-4 mb-8">
                                        <div className="bg-white/5 p-3 rounded-xl border border-white/10">
                                            <p className="text-[10px] text-slate-500 uppercase font-bold mb-1">Max Speed</p>
                                            <div className="h-1.5 w-full bg-white/10 rounded-full overflow-hidden">
                                                <div className="h-full bg-red-500" style={{ width: `${(garageVeh.maxSpeed / 55) * 100}%` }} />
                                            </div>
                                        </div>
                                        <div className="bg-white/5 p-3 rounded-xl border border-white/10">
                                            <p className="text-[10px] text-slate-500 uppercase font-bold mb-1">Acceleration</p>
                                            <div className="h-1.5 w-full bg-white/10 rounded-full overflow-hidden">
                                                <div className="h-full bg-yellow-500" style={{ width: `${(garageVeh.acceleration / 1.0) * 100}%` }} />
                                            </div>
                                        </div>
                                    </div>

                                    <button 
                                        onClick={buyOrSelect}
                                        disabled={!userData.unlocked.includes(garageVeh.id) && userData.coins < garageVeh.price}
                                        className={`w-full py-4 rounded-2xl font-black text-lg transition-all ${
                                            userData.selectedVehicle === garageVeh.id 
                                            ? 'bg-green-600/20 text-green-500 border border-green-500/50' 
                                            : userData.unlocked.includes(garageVeh.id)
                                            ? 'bg-blue-600 hover:scale-105'
                                            : 'bg-red-600 hover:scale-105'
                                        } disabled:opacity-50 disabled:scale-100`}
                                    >
                                        {userData.selectedVehicle === garageVeh.id 
                                            ? 'TERPILIH' 
                                            : userData.unlocked.includes(garageVeh.id) 
                                            ? 'PAKAI MOBIL' 
                                            : `BELI - ${garageVeh.price.toLocaleString()}`
                                        }
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {gameState === 'playing' && (
                        <div className="h-full relative flex justify-center items-center">
                            <div className={`w-full max-w-lg h-full bg-slate-900 relative border-x-8 border-slate-700 overflow-hidden`}>
                                <div className="absolute inset-0 road-animate" style={{ 
                                    '--speed': `${0.8 / (0.1 + myCar.speed * 0.1)}s`,
                                    backgroundImage: 'linear-gradient(#fff 40px, transparent 40px)', 
                                    backgroundSize: '4px 200px', 
                                    backgroundPosition: 'center' 
                                }} />

                                {npcs.map(n => (
                                    <div key={n.id} className="absolute transition-all duration-100" style={{ left: `${n.x}%`, top: `${n.y}%`, transform: 'translateX(-50%)' }}>
                                        <CarModel color={n.color} />
                                    </div>
                                ))}

                                {explosion && (
                                    <div className="explode-effect" style={{ left: `${explosion.x}%`, top: `${explosion.y}%`, transform: 'translate(-50%, -50%)' }} />
                                )}

                                <div 
                                    className="absolute z-50 transition-all duration-75" 
                                    style={{ 
                                        left: `${myCar.x}%`, 
                                        top: cameraMode === 'pov' ? '90%' : '80%', 
                                        transform: 'translateX(-50%)',
                                        width: cameraMode === 'pov' ? '100%' : 'auto',
                                        opacity: myCar.isCrashed ? 0 : 1
                                    }}
                                >
                                    <CarModel color={curVeh.color} isPOV={cameraMode === 'pov'} />
                                </div>
                            </div>

                            <div className="absolute top-6 left-6 right-6 flex justify-between pointer-events-none">
                                <div className="bg-black/60 backdrop-blur-md p-3 rounded-xl border border-white/10">
                                    <p className="text-[10px] font-bold text-red-500 uppercase">Speed</p>
                                    <p className="text-xl font-black">{(myCar.speed * 20).toFixed(0)} km/h</p>
                                </div>
                                <button 
                                    onClick={() => setCameraMode(prev => prev === 'third' ? 'pov' : 'third')}
                                    className="bg-white/10 backdrop-blur-md p-3 rounded-xl border border-white/10 pointer-events-auto active:scale-90 transition-transform"
                                >
                                    <Icons.Camera />
                                </button>
                                <div className="bg-black/60 backdrop-blur-md p-3 rounded-xl border border-white/10 text-right">
                                    <p className="text-[10px] font-bold text-yellow-500 uppercase">Jarak</p>
                                    <p className="text-xl font-black">{Math.max(0, myCar.finishLine - Math.floor(myCar.distance))}m</p>
                                </div>
                            </div>

                            <div className="absolute bottom-10 inset-x-6 flex justify-between md:hidden">
                                <div className="flex gap-2">
                                    <button onPointerDown={()=>keys.current['a']=true} onPointerUp={()=>keys.current['a']=false} className="w-16 h-16 bg-white/10 rounded-2xl border border-white/20 active:bg-red-600">L</button>
                                    <button onPointerDown={()=>keys.current['d']=true} onPointerUp={()=>keys.current['d']=false} className="w-16 h-16 bg-white/10 rounded-2xl border border-white/20 active:bg-red-600">R</button>
                                </div>
                                <button onPointerDown={()=>keys.current['w']=true} onPointerUp={()=>keys.current['w']=false} className="w-20 h-20 bg-red-600 rounded-full border-4 border-yellow-400 font-black italic shadow-xl">GAS</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
